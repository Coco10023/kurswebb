<h1>Kurser</h1>

  <input
  type="text"
  placeholder="Sök kurs..."
  [(ngModel)]="searchText">

<p>Antal kurser: {{ filteredCourses.length }}</p>

@for (course of filteredCourses; track course.courseCode) {
  <article>
    <h2>{{ course.courseCode }} - {{ course.courseName }}</h2>
    <p>{{ course.points }} hp</p>
    <p>{{ course.subject }}</p>
    <a [href]="course.syllabus" target="_blank">Kursplan</a>
  </article>
}
