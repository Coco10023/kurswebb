<h1>Kurser</h1>

<!-- Sökfält för filtrering på kurskod eller kursnamn -->
<input
  type="text"
  placeholder="Sök kurs..."
  [ngModel]="searchText()"
  (ngModelChange)="searchText.set($event)">

<!-- Dropdown för filtrering på ämne -->
<label for="subject">Välj ämne:</label>

<select
  id="subject"
  [ngModel]="selectedSubject()"
  (ngModelChange)="selectedSubject.set($event)">
  <option value="">Alla ämnen</option>

  @for (subject of subjects(); track subject) {
    <option [value]="subject">{{ subject }}</option>
  }
</select>

<!-- Dropdown för sortering av kurser -->
<label for="sort">Sortera efter:</label>

<select
  id="sort"
  [ngModel]="sortBy()"
  (ngModelChange)="sortBy.set($event)">
  <option value="courseCode">Kurskod</option>
  <option value="courseName">Kursnamn</option>
  <option value="points">Poäng</option>
  <option value="subject">Ämne</option>
</select>

<!-- Visar antal kurser efter sökning och filtrering -->
<p>Antal kurser: {{ filteredCourses().length }}</p>

<!-- Skriver ut alla filtrerade kurser -->
@for (course of filteredCourses(); track course.courseCode) {
  <article>
    <h2>{{ course.courseCode }} - {{ course.courseName }}</h2>

    <p>{{ course.points }} hp</p>
    <p>{{ course.subject }}</p>

    <a [href]="course.syllabus" target="_blank">Kursplan</a>

    <button
      type="button"
      (click)="addToSchedule(course)">
      Lägg till i ramschema
    </button>
  </article>
}
